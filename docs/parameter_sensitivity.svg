    <rect x="210" y="150" width="80" height="50" fill="#deebf7" stroke="#fff"/>
    <rect x="50" y="210" width="80" height="50" fill="#f7fbff" stroke="#fff"/>
    <rect x="130" y="210" width="80" height="50" fill="#f7fbff" stroke="#fff"/>
    <rect x="210" y="210" width="80" height="50" fill="#eff3ff" stroke="#fff"/>

    <g font-family="Arial, sans-serif" font-size="12.5" font-weight="bold" fill="#222">
      <text x="90" y="60" text-anchor="middle">1.11B</text>
      <text x="170" y="60" text-anchor="middle">1.34B</text>
      <text x="250" y="60" text-anchor="middle">1.54B</text>
      <text x="90" y="120" text-anchor="middle">81.3M</text>
      <text x="170" y="120" text-anchor="middle">283.8M</text>
      <text x="250" y="120" text-anchor="middle">304.2M</text>
      <text x="90" y="180" text-anchor="middle">80.2M</text>
      <text x="170" y="180" text-anchor="middle">107.5M</text>
      <text x="250" y="180" text-anchor="middle">220.8M</text>
      <text x="90" y="240" text-anchor="middle">60.1M</text>
      <text x="170" y="240" text-anchor="middle">77.7M</text>
      <text x="250" y="240" text-anchor="middle">112.7M</text>
