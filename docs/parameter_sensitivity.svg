  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#444">
    <text x="245" y="475" text-anchor="middle">Darker red means higher throughput.</text>
    <text x="735" y="475" text-anchor="middle">Darker blue means larger returned delete values.</text>
