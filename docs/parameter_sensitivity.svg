    <rect x="50" y="30" width="80" height="50" fill="#c6dbef" stroke="#fff"/>
    <rect x="130" y="30" width="80" height="50" fill="#6baed6" stroke="#fff"/>
    <rect x="210" y="30" width="80" height="50" fill="#2171b5" stroke="#fff"/>
    <rect x="50" y="90" width="80" height="50" fill="#f7fbff" stroke="#fff"/>
    <rect x="130" y="90" width="80" height="50" fill="#deebf7" stroke="#fff"/>
